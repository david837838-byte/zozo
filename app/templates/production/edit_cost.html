{% extends "base.html" %}

{% block title %}تعديل تكلفة إنتاج{% endblock %}

{% block content %}
<div class="row mb-4">
    <div class="col-12">
        <h1>
            <i class="fas fa-edit"></i> تعديل تكلفة إنتاج
        </h1>
    </div>
</div>

<div class="card shadow">
    <div class="card-body">
        <form method="POST">
            <div class="row mb-3">
                <div class="col-md-6">
                    <label for="crop_id" class="form-label">
                        <i class="fas fa-leaf"></i> الصنف
                    </label>
                    <select class="form-control" id="crop_id" name="crop_id" required>
                        <option value="">-- اختر صنفاً --</option>
                        {% for crop in crops %}
                            <option value="{{ crop.id }}"{% if crop.id == cost.crop_id %} selected{% endif %}>
                                {{ crop.name }}
                            </option>
                        {% endfor %}
                    </select>
                </div>
                <div class="col-md-6">
                    <label for="cost_date" class="form-label">
                        <i class="fas fa-calendar"></i> التاريخ
                    </label>
                    <input type="date" class="form-control" id="cost_date" name="cost_date" 
                           value="{{ cost.cost_date.strftime('%Y-%m-%d') }}" required>
                </div>
            </div>

            <div class="row mb-3">
                <div class="col-md-6">
                    <label for="cost_type" class="form-label">
                        <i class="fas fa-tag"></i> نوع التكلفة
                    </label>
                    <select class="form-control" id="cost_type" name="cost_type" required>
                        <option value="">-- اختر --</option>
                        <option value="مباشرة"{% if cost.cost_type == 'مباشرة' %} selected{% endif %}>مباشرة</option>
                        <option value="غير مباشرة"{% if cost.cost_type == 'غير مباشرة' %} selected{% endif %}>غير مباشرة</option>
                    </select>
                </div>
                <div class="col-md-6">
                    <label for="cost_category" class="form-label">
                        <i class="fas fa-layer-group"></i> فئة التكلفة
                    </label>
                    <select class="form-control" id="cost_category" name="cost_category" required>
                        <option value="">-- اختر --</option>
                        <option value="أسمدة"{% if cost.cost_category == 'أسمدة' %} selected{% endif %}>أسمدة</option>
                        <option value="مبيدات"{% if cost.cost_category == 'مبيدات' %} selected{% endif %}>مبيدات</option>
                        <option value="بذور"{% if cost.cost_category == 'بذور' %} selected{% endif %}>بذور</option>
                        <option value="عمالة"{% if cost.cost_category == 'عمالة' %} selected{% endif %}>عمالة</option>
                        <option value="ري"{% if cost.cost_category == 'ري' %} selected{% endif %}>ري</option>
                        <option value="آلات"{% if cost.cost_category == 'آلات' %} selected{% endif %}>آلات</option>
                        <option value="أخرى"{% if cost.cost_category == 'أخرى' %} selected{% endif %}>أخرى</option>
                    </select>
                </div>
            </div>

            <div class="mb-3">
                <label for="description" class="form-label">
                    <i class="fas fa-align-left"></i> الوصف
                </label>
                <input type="text" class="form-control" id="description" name="description" 
                       value="{{ cost.description or '' }}" placeholder="وصف التكلفة">
            </div>

            <div class="row mb-3">
                <div class="col-md-4">
                    <label for="quantity" class="form-label">الكمية</label>
                    <input type="number" class="form-control" id="quantity" name="quantity" step="0.01"
                           value="{% if cost.quantity %}{{ cost.quantity }}{% endif %}"
                           placeholder="الكمية (اختياري)">
                </div>
                <div class="col-md-4">
                    <label for="unit_cost" class="form-label">
                        <i class="fas fa-coins"></i> سعر الوحدة
                    </label>
                    <input type="number" class="form-control" id="unit_cost" name="unit_cost" step="0.01"
                           value="{{ cost.unit_cost or 0 }}" required>
                </div>
                <div class="col-md-4">
                    <label for="total_cost" class="form-label">
                        <i class="fas fa-coins"></i> التكلفة الإجمالية
                    </label>
                    <input type="number" class="form-control" id="total_cost" name="total_cost" step="0.01"
                           value="{{ cost.total_cost or 0 }}" required>
                </div>
            </div>

            <div class="row mb-3">
                <div class="col-md-6">
                    <label for="reference_number" class="form-label">
                        <i class="fas fa-hashtag"></i> رقم المرجع
                    </label>
                    <input type="text" class="form-control" id="reference_number" name="reference_number"
                           value="{{ cost.reference_number or '' }}" placeholder="رقم الفاتورة أو الوصل">
                </div>
            </div>

            <div class="mb-3">
                <label for="notes" class="form-label">
                    <i class="fas fa-note-sticky"></i> ملاحظات
                </label>
                <textarea class="form-control" id="notes" name="notes" rows="3">{{ cost.notes or '' }}</textarea>
            </div>

            <div class="mb-3">
                <button type="submit" class="btn btn-primary btn-lg">
                    <i class="fas fa-save"></i> حفظ التعديلات
                </button>
                <a href="{{ url_for('production.production_costs') }}" class="btn btn-secondary btn-lg">
                    <i class="fas fa-arrow-left"></i> إلغاء
                </a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
