{% extends "base.html" %}

{% block title %}إضافة استهلاك{% endblock %}

{% block content %}
<div class="row mb-4">
    <div class="col-12">
        <h1>إضافة استهلاك - أدوية، أسمدة، أو مشتقات نفطية</h1>
    </div>
</div>

<div class="card">
    <div class="card-body">
        <form method="POST">
            <div class="row">
                <div class="col-md-6 mb-3">
                    <label for="inventory_item_id" class="form-label">المنتج</label>
                    <select class="form-select" id="inventory_item_id" name="inventory_item_id" required 
                            onchange="updateItemInfo()">
                        <option selected>-- اختر منتج --</option>
                        {% for item in inventory_items %}
                        <option value="{{ item.id }}" data-category="{{ item.category }}" 
                                data-quantity="{{ item.quantity }}" data-unit="{{ item.unit }}">
                            {{ item.name }} ({{ item.category }})
                        </option>
                        {% endfor %}
                    </select>
                </div>
                <div class="col-md-6 mb-3">
                    <label for="consumption_type" class="form-label">نوع الاستهلاك</label>
                    <input type="text" class="form-control" id="consumption_type" name="consumption_type" 
                           placeholder="مثال: رش، تسميد، وقود، إلخ" required>
                </div>
            </div>

            <div class="row">
                <div class="col-md-3 mb-3">
                    <label for="quantity_used" class="form-label">الكمية المستخدمة</label>
                    <input type="number" class="form-control" id="quantity_used" name="quantity_used" 
                           step="0.01" required min="0.01">
                </div>
                <div class="col-md-3 mb-3">
                    <label for="unit_display" class="form-label">الوحدة</label>
                    <input type="text" class="form-control" id="unit_display" disabled>
                </div>
                <div class="col-md-3 mb-3">
                    <label for="available_quantity" class="form-label">الكمية المتوفرة</label>
                    <input type="text" class="form-control" id="available_quantity" disabled>
                </div>
                <div class="col-md-3 mb-3">
                    <label for="consumption_date" class="form-label">تاريخ الاستهلاك</label>
                    <input type="date" class="form-control" id="consumption_date" name="consumption_date" 
                           required value="{{ today | default('', true) }}">
                </div>
            </div>

            <div class="mb-3">
                <label for="notes" class="form-label">ملاحظات</label>
                <textarea class="form-control" id="notes" name="notes" rows="3" placeholder="أضف أي ملاحظات إضافية..."></textarea>
            </div>

            <div class="mb-3">
                <button type="submit" class="btn btn-primary">
                    <i class="bi bi-check-circle"></i> تسجيل الاستهلاك
                </button>
                <a href="{{ url_for('production.general_consumptions') }}" class="btn btn-secondary">
                    <i class="bi bi-x-circle"></i> إلغاء
                </a>
            </div>
        </form>
    </div>
</div>

<script>
function updateItemInfo() {
    const select = document.getElementById('inventory_item_id');
    const option = select.options[select.selectedIndex];
    
    document.getElementById('unit_display').value = option.getAttribute('data-unit') || '';
    document.getElementById('available_quantity').value = option.getAttribute('data-quantity') || '';
}

// Set today's date as default
document.addEventListener('DOMContentLoaded', function() {
    const today = new Date().toISOString().split('T')[0];
    document.getElementById('consumption_date').value = today;
});
</script>
{% endblock %}
