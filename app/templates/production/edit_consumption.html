{% extends "base.html" %}

{% block title %}تعديل الاستهلاك - {{ crop.name }}{% endblock %}

{% block content %}
<div class="row mb-4">
    <div class="col-12">
        <h1><i class="fas fa-edit"></i> تعديل الاستهلاك للصنف: {{ crop.name }}</h1>
    </div>
</div>

<div class="card shadow-sm">
    <div class="card-body">
        <form method="POST">
            <div class="row">
                <div class="col-md-6 mb-3">
                    <label for="inventory_item_id" class="form-label">عنصر المخزون</label>
                    <select class="form-select" id="inventory_item_id" name="inventory_item_id" required>
                        {% for item in inventory_items %}
                        <option value="{{ item.id }}" {% if consumption.inventory_item_id == item.id %}selected{% endif %}>
                            {{ item.name }} ({{ item.category }}) - المتاح: {{ item.quantity }} {{ item.unit }}
                        </option>
                        {% endfor %}
                    </select>
                </div>
                <div class="col-md-3 mb-3">
                    <label for="quantity_used" class="form-label">الكمية</label>
                    <input type="number" step="0.01" class="form-control" id="quantity_used" name="quantity_used" value="{{ consumption.quantity_used }}" required>
                </div>
                <div class="col-md-3 mb-3">
                    <label for="consumption_date" class="form-label">التاريخ</label>
                    <input type="date" class="form-control" id="consumption_date" name="consumption_date" value="{{ consumption.consumption_date }}" required>
                </div>
            </div>

            <div class="mb-3">
                <label for="notes" class="form-label">ملاحظات</label>
                <textarea class="form-control" id="notes" name="notes" rows="3">{{ consumption.notes or '' }}</textarea>
            </div>

            <button type="submit" class="btn btn-primary">
                <i class="fas fa-save"></i> حفظ التعديلات
            </button>
            <a href="{{ url_for('production.crop_consumptions', crop_id=crop.id) }}" class="btn btn-secondary">
                <i class="fas fa-times"></i> إلغاء
            </a>
        </form>
    </div>
</div>
{% endblock %}
