{% extends "base.html" %}

{% block title %}تغيير كلمة المرور{% endblock %}

{% block content %}
<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card shadow">
                <div class="card-header bg-primary text-white">
                    <h4 class="mb-0">تغيير كلمة المرور</h4>
                </div>
                <div class="card-body">
                    <form method="POST" class="needs-validation">
                        <div class="mb-3">
                            <label for="current_password" class="form-label">كلمة المرور الحالية</label>
                            <input type="password" class="form-control" id="current_password" 
                                   name="current_password" required>
                            <small class="text-muted">أدخل كلمة المرور الحالية للتحقق</small>
                        </div>
                        
                        <div class="mb-3">
                            <label for="new_password" class="form-label">كلمة المرور الجديدة</label>
                            <input type="password" class="form-control" id="new_password" 
                                   name="new_password" required minlength="6">
                            <small class="text-muted">يجب أن تكون على الأقل 6 أحرف</small>
                        </div>
                        
                        <div class="mb-3">
                            <label for="confirm_password" class="form-label">تأكيد كلمة المرور</label>
                            <input type="password" class="form-control" id="confirm_password" 
                                   name="confirm_password" required minlength="6">
                            <small class="text-muted">أعد إدخال كلمة المرور الجديدة</small>
                        </div>
                        
                        <div class="d-grid gap-2">
                            <button type="submit" class="btn btn-primary">
                                <i class="fas fa-lock"></i> تغيير كلمة المرور
                            </button>
                            <a href="{{ url_for('home.index') }}" class="btn btn-secondary">
                                <i class="fas fa-arrow-left"></i> إلغاء
                            </a>
                        </div>
                    </form>
                </div>
            </div>
            
            <div class="alert alert-info mt-3" role="alert">
                <i class="fas fa-info-circle"></i>
                <strong>نصيحة أمان:</strong> استخدم كلمة مرور قوية تحتوي على أحرف وأرقام ورموز.
            </div>
        </div>
    </div>
</div>

<script>
// تحقق من تطابق كلمات المرور
document.getElementById('confirm_password').addEventListener('change', function() {
    const newPassword = document.getElementById('new_password').value;
    const confirmPassword = this.value;
    
    if (newPassword !== confirmPassword) {
        this.classList.add('is-invalid');
        if (!document.getElementById('mismatch-error')) {
            const error = document.createElement('div');
            error.id = 'mismatch-error';
            error.className = 'invalid-feedback d-block';
            error.textContent = 'كلمات المرور غير متطابقة';
            this.parentElement.appendChild(error);
        }
    } else {
        this.classList.remove('is-invalid');
        const error = document.getElementById('mismatch-error');
        if (error) error.remove();
    }
});
</script>
{% endblock %}
