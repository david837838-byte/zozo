{% extends "base.html" %}

{% block title %}تعديل بيانات العامل{% endblock %}

{% block content %}
<div class="row mb-4">
    <div class="col-12">
        <h1>تعديل بيانات {{ worker.name }}</h1>
    </div>
</div>

<div class="card">
    <div class="card-body">
        <form method="POST">
            <div class="row">
                <div class="col-md-6 mb-3">
                    <label for="name" class="form-label">اسم العامل</label>
                    <input type="text" class="form-control" id="name" name="name" value="{{ worker.name }}" required>
                </div>
                <div class="col-md-6 mb-3">
                    <label for="phone" class="form-label">رقم الهاتف</label>
                    <input type="tel" class="form-control" id="phone" name="phone" value="{{ worker.phone or '' }}">
                </div>
            </div>

            <div class="row">
                <div class="col-md-6 mb-3">
                    <label for="email" class="form-label">البريد الإلكتروني</label>
                    <input type="email" class="form-control" id="email" name="email" value="{{ worker.email or '' }}">
                </div>
                <div class="col-md-6 mb-3">
                    <label for="work_location" class="form-label">موقع العمل</label>
                    <select class="form-select" id="work_location" name="work_location">
                        <option{% if not worker.work_location %} selected{% endif %}>-- اختر --</option>
                        <option value="جبل"{% if worker.work_location == 'جبل' %} selected{% endif %}>جبل</option>
                        <option value="سهل"{% if worker.work_location == 'سهل' %} selected{% endif %}>سهل</option>
                    </select>
                </div>
            </div>

            <div class="row">
                <div class="col-md-6 mb-3">
                    <div class="form-check">
                        <input class="form-check-input" type="checkbox" id="is_monthly" name="is_monthly"{% if worker.is_monthly %} checked{% endif %}>
                        <label class="form-check-label" for="is_monthly">عامل شهري</label>
                    </div>
                </div>
            </div>

            <div class="row">
                <div class="col-md-6 mb-3">
                    <label for="hourly_rate" class="form-label">السعر بالساعة</label>
                    <input type="number" class="form-control" id="hourly_rate" name="hourly_rate" step="0.01" value="{{ worker.hourly_rate }}">
                </div>
                <div class="col-md-6 mb-3">
                    <label for="monthly_salary" class="form-label">الراتب الشهري</label>
                    <input type="number" class="form-control" id="monthly_salary" name="monthly_salary" step="0.01" value="{{ worker.monthly_salary }}">
                </div>
            </div>

            <div class="mb-3">
                <button type="submit" class="btn btn-primary">
                    <i class="bi bi-check-circle"></i> حفظ التعديلات
                </button>
                <a href="{{ url_for('workers.index') }}" class="btn btn-secondary">
                    <i class="bi bi-x-circle"></i> إلغاء
                </a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
