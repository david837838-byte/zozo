{% extends "base.html" %}

{% block title %}تعديل العائلة{% endblock %}

{% block content %}
<div class="container mt-4">
    <div class="row mb-4">
        <div class="col-12">
            <h2>تعديل عائلة {{ family.family_name }}</h2>
        </div>
    </div>

    <div class="card">
        <div class="card-body">
            <form method="POST">
                <div class="row">
                    <div class="col-md-6 mb-3">
                        <label for="family_name" class="form-label">اسم العائلة</label>
                        <input type="text" class="form-control" id="family_name" name="family_name" value="{{ family.family_name }}" required>
                    </div>
                    <div class="col-md-6 mb-3">
                        <label for="contact_name" class="form-label">مسؤول العائلة</label>
                        <input type="text" class="form-control" id="contact_name" name="contact_name" value="{{ family.contact_name or '' }}">
                    </div>
                </div>

                <div class="row">
                    <div class="col-md-6 mb-3">
                        <label for="phone" class="form-label">رقم الهاتف</label>
                        <input type="tel" class="form-control" id="phone" name="phone" value="{{ family.phone or '' }}">
                    </div>
                    <div class="col-md-6 mb-3 d-flex align-items-end">
                        <div class="form-check">
                            <input class="form-check-input" type="checkbox" id="is_active" name="is_active"{% if family.is_active %} checked{% endif %}>
                            <label class="form-check-label" for="is_active">عائلة نشطة</label>
                        </div>
                    </div>
                </div>

                <hr>
                <h5 class="mb-3">التسعير الافتراضي</h5>

                <div class="row">
                    <div class="col-md-3 mb-3">
                        <label for="male_hourly_rate" class="form-label">ساعة شاب</label>
                        <input type="number" step="0.01" min="0" class="form-control" id="male_hourly_rate" name="male_hourly_rate" value="{{ family.male_hourly_rate or 0 }}">
                    </div>
                    <div class="col-md-3 mb-3">
                        <label for="female_hourly_rate" class="form-label">ساعة بنت</label>
                        <input type="number" step="0.01" min="0" class="form-control" id="female_hourly_rate" name="female_hourly_rate" value="{{ family.female_hourly_rate or 0 }}">
                    </div>
                    <div class="col-md-3 mb-3">
                        <label for="male_monthly_salary" class="form-label">شهري شاب</label>
                        <input type="number" step="0.01" min="0" class="form-control" id="male_monthly_salary" name="male_monthly_salary" value="{{ family.male_monthly_salary or 0 }}">
                    </div>
                    <div class="col-md-3 mb-3">
                        <label for="female_monthly_salary" class="form-label">شهري بنت</label>
                        <input type="number" step="0.01" min="0" class="form-control" id="female_monthly_salary" name="female_monthly_salary" value="{{ family.female_monthly_salary or 0 }}">
                    </div>
                </div>

                <div class="mb-3">
                    <label for="notes" class="form-label">ملاحظات</label>
                    <textarea class="form-control" id="notes" name="notes" rows="3">{{ family.notes or '' }}</textarea>
                </div>

                <div>
                    <button type="submit" class="btn btn-primary">
                        <i class="fas fa-check-circle"></i> حفظ التعديلات
                    </button>
                    <a href="{{ url_for('workers.group_families') }}" class="btn btn-secondary">
                        <i class="fas fa-times-circle"></i> إلغاء
                    </a>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
