{% extends "base.html" %}

{% block title %}تعديل عملية شراء{% endblock %}

{% block content %}
<div class="container mt-4">
    <div class="row">
        <div class="col-md-8 offset-md-2">
            <h2>تعديل عملية شراء - {{ purchase.item.name }}</h2>
            
            <form method="POST" class="mt-4">
                <div class="card">
                    <div class="card-body">
                        <!-- Item Information -->
                        <div class="row mb-3">
                            <div class="col-md-6">
                                <label class="form-label">العنصر</label>
                                <input type="text" class="form-control" value="{{ purchase.item.name }}" disabled>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label">الفئة</label>
                                <input type="text" class="form-control" value="{{ purchase.item.category }}" disabled>
                            </div>
                        </div>

                        <!-- Purchase Details -->
                        <div class="row mb-3">
                            <div class="col-md-6">
                                <label for="quantity" class="form-label">الكمية <span class="text-danger">*</span></label>
                                <input type="number" step="0.01" class="form-control" id="quantity" 
                                       name="quantity" value="{{ purchase.quantity }}" required onchange="calculateTotal()">
                                <small class="text-muted">الوحدة: {{ purchase.item.unit }}</small>
                            </div>
                            <div class="col-md-6">
                                <label for="unit_price" class="form-label">سعر الوحدة ($) <span class="text-danger">*</span></label>
                                <input type="number" step="0.01" class="form-control" id="unit_price" 
                                       name="unit_price" value="{{ purchase.unit_price }}" required onchange="calculateTotal()">
                            </div>
                        </div>

                        <!-- Total Cost Display -->
                        <div class="row mb-3">
                            <div class="col-md-6">
                                <div class="alert alert-info">
                                    <label class="form-label">إجمالي الكلفة</label>
                                    <h4>$<span id="total_cost">{{ "%.2f"|format(purchase.total_cost) }}</span></h4>
                                </div>
                            </div>
                            <div class="col-md-6">
                                <label for="purchase_date" class="form-label">تاريخ الشراء <span class="text-danger">*</span></label>
                                <input type="date" class="form-control" id="purchase_date" 
                                       name="purchase_date" required 
                                       value="{{ purchase.purchase_date.strftime('%Y-%m-%d') }}">
                            </div>
                        </div>

                        <!-- Supplier and Invoice -->
                        <div class="row mb-3">
                            <div class="col-md-6">
                                <label for="supplier" class="form-label">المورد</label>
                                <input type="text" class="form-control" id="supplier" name="supplier" 
                                       value="{{ purchase.supplier or '' }}" placeholder="اسم المورد">
                            </div>
                            <div class="col-md-6">
                                <label for="invoice_number" class="form-label">رقم الفاتورة</label>
                                <input type="text" class="form-control" id="invoice_number" name="invoice_number" 
                                       value="{{ purchase.invoice_number or '' }}" placeholder="رقم الفاتورة">
                            </div>
                        </div>

                        <!-- Notes -->
                        <div class="row mb-3">
                            <div class="col-12">
                                <label for="notes" class="form-label">ملاحظات</label>
                                <textarea class="form-control" id="notes" name="notes" 
                                          rows="3" placeholder="أي ملاحظات إضافية">{{ purchase.notes or '' }}</textarea>
                            </div>
                        </div>

                        <!-- Buttons -->
                        <div class="row">
                            <div class="col-12">
                                <button type="submit" class="btn btn-success">
                                    <i class="fas fa-check"></i> حفظ التعديلات
                                </button>
                                <a href="{{ url_for('inventory.inventory_purchases') }}" class="btn btn-secondary">
                                    <i class="fas fa-times"></i> إلغاء
                                </a>
                            </div>
                        </div>
                    </div>
                </div>
            </form>
        </div>
    </div>
</div>

<script>
function calculateTotal() {
    const quantity = parseFloat(document.getElementById('quantity').value) || 0;
    const unitPrice = parseFloat(document.getElementById('unit_price').value) || 0;
    const total = (quantity * unitPrice).toFixed(2);
    document.getElementById('total_cost').textContent = total;
}

// Calculate on page load
document.addEventListener('DOMContentLoaded', function() {
    calculateTotal();
});
</script>
{% endblock %}
