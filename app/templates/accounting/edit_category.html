{% extends "base.html" %}

{% block title %}تعديل فئة المصروفات{% endblock %}

{% block content %}
<div class="row mb-4">
    <div class="col-12">
        <h1>تعديل فئة المصروفات</h1>
    </div>
</div>

<div class="card">
    <div class="card-body">
        <form method="POST">
            <input type="hidden" name="csrf_token" value="{{ csrf_token }}">
            <div class="mb-3">
                <label for="name" class="form-label">اسم الفئة</label>
                <input type="text" class="form-control" id="name" name="name" value="{{ category.name }}" required>
            </div>
            
            <div class="mb-3">
                <label for="description" class="form-label">الوصف</label>
                <textarea class="form-control" id="description" name="description" rows="3">{{ category.description or '' }}</textarea>
            </div>

            <div class="mb-3">
                <button type="submit" class="btn btn-primary">
                    <i class="bi bi-check-circle"></i> حفظ التغييرات
                </button>
                <a href="{{ url_for('accounting.categories') }}" class="btn btn-secondary">
                    <i class="bi bi-x-circle"></i> إلغاء
                </a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
