{% extends "base.html" %}

{% block title %}تغيير كلمة المرور{% endblock %}

{% block content %}
<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card border-0 shadow-lg">
                <div class="card-header bg-warning text-dark">
                    <h4 class="mb-0">
                        <i class="fas fa-key"></i> تغيير كلمة المرور
                    </h4>
                </div>
                <div class="card-body p-5">
                    <div class="alert alert-info mb-4">
                        <strong>المستخدم:</strong> @{{ user.username }}<br>
                        <strong>الحساب:</strong> {{ account.name }}<br>
                        <strong>الاسم:</strong> {{ user.full_name }}
                    </div>

                    <form method="POST" action="{{ url_for('admin_accounts.change_user_password', account_id=account.id, user_id=user.id) }}">
                        <input type="hidden" name="csrf_token" value="{{ csrf_token }}" />
                        <div class="mb-3">
                            <label for="new_password" class="form-label">
                                <strong>كلمة المرور الجديدة</strong>
                            </label>
                            <input type="password" class="form-control" id="new_password" 
                                   name="new_password" placeholder="كلمة مرور قوية" required>
                            <small class="text-muted">يجب أن تكون على الأقل 6 أحرف</small>
                        </div>

                        <div class="mb-4">
                            <label for="confirm_password" class="form-label">
                                <strong>تأكيد كلمة المرور</strong>
                            </label>
                            <input type="password" class="form-control" id="confirm_password" 
                                   name="confirm_password" placeholder="كرر كلمة المرور" required>
                        </div>

                        <div class="d-flex gap-2">
                            <button type="submit" class="btn btn-warning btn-lg">
                                <i class="fas fa-save"></i> حفظ كلمة المرور الجديدة
                            </button>
                            <a href="{{ url_for('admin_accounts.account_users', account_id=account.id) }}" class="btn btn-secondary btn-lg">
                                <i class="fas fa-times"></i> إلغاء
                            </a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
