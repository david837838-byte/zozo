{% extends "base.html" %}

{% block title %}إضافة نوع شراحة{% endblock %}

{% block content %}
<div class="row mb-4">
    <div class="col-12">
        <h1>إضافة نوع شراحة جديد</h1>
    </div>
</div>

<div class="card">
    <div class="card-body">
        <form method="POST">
            <div class="row">
                <div class="col-md-6 mb-3">
                    <label for="name" class="form-label">اسم الصندوق</label>
                    <input type="text" class="form-control" id="name" name="name" required>
                </div>
                <div class="col-md-6 mb-3">
                    <label for="box_type" class="form-label">النوع</label>
                    <select class="form-select" id="box_type" name="box_type" required>
                        <option selected>-- اختر النوع --</option>
                        <option value="كبير">كبير</option>
                        <option value="صغير">صغير</option>
                        <option value="نصفي">نصفي</option>
                        <option value="فريز">فريز</option>
                        <option value="قرقوز">قرقوز</option>
                    </select>
                </div>
            </div>

            <div class="row">
                <div class="col-md-6 mb-3">
                    <label for="capacity" class="form-label">السعة</label>
                    <input type="number" class="form-control" id="capacity" name="capacity" step="0.01">
                </div>
                <div class="col-md-6 mb-3">
                    <label for="unit" class="form-label">الوحدة</label>
                    <input type="text" class="form-control" id="unit" name="unit" placeholder="كيس، صندوق، إلخ">
                </div>
            </div>

            <div class="row">
                <div class="col-md-6 mb-3">
                    <label for="cost_per_box" class="form-label">سعر الصندوق الواحد</label>
                    <input type="number" class="form-control" id="cost_per_box" name="cost_per_box" step="0.01" required>
                </div>
                <div class="col-md-6 mb-3">
                    <label for="supplier" class="form-label">الموردة</label>
                    <input type="text" class="form-control" id="supplier" name="supplier">
                </div>
            </div>

            <div class="mb-3">
                <button type="submit" class="btn btn-primary">
                    <i class="bi bi-check-circle"></i> إضافة النوع
                </button>
                <a href="{{ url_for('settings.boxes') }}" class="btn btn-secondary">
                    <i class="bi bi-x-circle"></i> إلغاء
                </a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
